<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PKI System{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a14;
  --surface: #0a1628;
  --surface2: #0f2040;
  --accent: #00d4ff;
  --accent2: #00ff88;
  --warn: #ff6b35;
  --danger: #ff3366;
  --text: #c8d8e8;
  --text-dim: #4a6080;
  --border: #1a3050;
  --glow: 0 0 20px rgba(0,212,255,0.3);
  --glow2: 0 0 20px rgba(0,255,136,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(0,255,136,0.03) 0%, transparent 60%);
}
.mono { font-family: 'Share Tech Mono', monospace; }
/* NAVBAR */
.navbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 0 32px;
  height: 64px;
  background: rgba(10,22,40,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  position: sticky; top:0; z-index:100;
}
.nav-brand {
  display:flex; align-items:center; gap:12px;
  font-family:'Share Tech Mono',monospace; font-size:18px; color:var(--accent);
  letter-spacing:2px;
}
.nav-brand .shield { font-size:24px; }
.nav-links { display:flex; gap:8px; align-items:center; }
.nav-links a, .nav-links button {
  padding:8px 16px; border-radius:6px;
  color: var(--text-dim); text-decoration:none;
  font-size:13px; font-weight:600; letter-spacing:1px;
  background:none; border:none; cursor:pointer;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links button:hover { color:var(--accent); background: rgba(0,212,255,0.08); }
.nav-links .active { color:var(--accent); }
.badge-ca { color: var(--danger) !important; }
.badge-ra { color: var(--warn) !important; }
.badge-user { color: var(--accent2) !important; }
.role-chip {
  padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;
  font-family:'Share Tech Mono',monospace; letter-spacing:1px;
}
.role-chip.ca { background:rgba(255,51,102,0.15); color:var(--danger); border:1px solid rgba(255,51,102,0.3); }
.role-chip.ra { background:rgba(255,107,53,0.15); color:var(--warn); border:1px solid rgba(255,107,53,0.3); }
.role-chip.user { background:rgba(0,255,136,0.1); color:var(--accent2); border:1px solid rgba(0,255,136,0.3); }
/* LAYOUT */
.main { padding:32px; max-width:1400px; margin:0 auto; }
.page-header { margin-bottom:32px; }
.page-header h1 {
  font-size:28px; font-weight:700;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.page-header p { color:var(--text-dim); font-size:14px; margin-top:4px; }
/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity:0.6;
}
.card-title {
  font-size:13px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--text-dim); margin-bottom:16px;
  font-family:'Share Tech Mono',monospace;
}
/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:10px; padding:20px;
  position:relative; overflow:hidden;
}
.stat-card .stat-value {
  font-size:36px; font-weight:900;
  font-family:'Share Tech Mono',monospace;
  line-height:1;
}
.stat-card .stat-label { font-size:11px; color:var(--text-dim); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }
.stat-card.accent .stat-value { color:var(--accent); text-shadow:0 0 20px rgba(0,212,255,0.5); }
.stat-card.green .stat-value { color:var(--accent2); text-shadow:0 0 20px rgba(0,255,136,0.4); }
.stat-card.warn .stat-value { color:var(--warn); text-shadow:0 0 20px rgba(255,107,53,0.4); }
.stat-card.danger .stat-value { color:var(--danger); text-shadow:0 0 20px rgba(255,51,102,0.4); }
/* BUTTONS */
.btn {
  padding:10px 20px; border-radius:8px;
  font-size:13px; font-weight:700; letter-spacing:1px;
  cursor:pointer; border:none; font-family:'Exo 2',sans-serif;
  transition: all 0.2s; display:inline-flex; align-items:center; gap:8px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #0099cc);
  color:#fff;
}
.btn-primary:hover { transform:translateY(-1px); box-shadow:var(--glow); }
.btn-success {
  background: linear-gradient(135deg, var(--accent2), #00aa55);
  color:#000;
}
.btn-success:hover { transform:translateY(-1px); box-shadow:var(--glow2); }
.btn-danger { background:rgba(255,51,102,0.2); color:var(--danger); border:1px solid rgba(255,51,102,0.4); }
.btn-danger:hover { background:rgba(255,51,102,0.35); }
.btn-warn { background:rgba(255,107,53,0.2); color:var(--warn); border:1px solid rgba(255,107,53,0.4); }
.btn-warn:hover { background:rgba(255,107,53,0.35); }
.btn-ghost { background:rgba(255,255,255,0.05); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:rgba(255,255,255,0.1); }
.btn-sm { padding:6px 12px; font-size:11px; }
/* FORMS */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; }
.form-control {
  width:100%; padding:10px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius:8px; color:var(--text);
  font-family:'Exo 2',sans-serif; font-size:14px;
  transition: border-color 0.2s;
}
.form-control:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,212,255,0.1); }
.form-control::placeholder { color:var(--text-dim); }
textarea.form-control { resize:vertical; font-family:'Share Tech Mono',monospace; font-size:12px; }
/* TABLES */
.table-container { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th {
  padding:10px 14px; text-align:left;
  font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--text-dim); border-bottom:1px solid var(--border);
  font-family:'Share Tech Mono',monospace;
}
tbody tr { border-bottom:1px solid rgba(26,48,80,0.5); transition:background 0.15s; }
tbody tr:hover { background:rgba(0,212,255,0.04); }
tbody td { padding:12px 14px; font-size:13px; }
/* STATUS BADGES */
.status { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; font-family:'Share Tech Mono',monospace; letter-spacing:0.5px; }
.status-valid,.status-issued { background:rgba(0,255,136,0.12); color:var(--accent2); border:1px solid rgba(0,255,136,0.25); }
.status-pending { background:rgba(255,107,53,0.12); color:var(--warn); border:1px solid rgba(255,107,53,0.25); }
.status-ra_approved { background:rgba(0,212,255,0.12); color:var(--accent); border:1px solid rgba(0,212,255,0.25); }
.status-rejected,.status-revoked { background:rgba(255,51,102,0.12); color:var(--danger); border:1px solid rgba(255,51,102,0.25); }
/* CERT VIEWER */
.cert-viewer {
  background: #020812;
  border:1px solid var(--border);
  border-radius:10px; padding:20px;
  font-family:'Share Tech Mono',monospace; font-size:12px; line-height:1.8;
}
.cert-field { display:flex; gap:16px; padding:6px 0; border-bottom:1px solid rgba(26,48,80,0.5); }
.cert-field:last-child { border-bottom:none; }
.cert-key { color:var(--text-dim); min-width:180px; font-size:11px; letter-spacing:1px; }
.cert-val { color:var(--accent); word-break:break-all; }
/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center; z-index:1000;
  backdrop-filter:blur(4px);
}
.modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:90%; max-width:600px; max-height:90vh; overflow-y:auto; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; color:var(--accent); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
/* ALERTS */
.alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.alert-success { background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); color:var(--accent2); }
.alert-error { background:rgba(255,51,102,0.1); border:1px solid rgba(255,51,102,0.3); color:var(--danger); }
.alert-info { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.3); color:var(--accent); }
/* LOADER */
.loader { display:inline-block; width:16px; height:16px; border:2px solid rgba(0,212,255,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
/* GRID */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
@media (max-width:900px) { .grid-2,.grid-3 { grid-template-columns:1fr; } }
/* WORKFLOW */
.workflow { display:flex; align-items:center; gap:0; margin:24px 0; overflow-x:auto; padding:8px 0; }
.wf-step {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  min-width:120px; position:relative;
}
.wf-step:not(:last-child)::after {
  content:'→'; position:absolute; right:-18px; top:18px;
  color:var(--text-dim); font-size:20px;
}
.wf-icon {
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; border:2px solid;
}
.wf-icon.user { border-color:var(--accent2); background:rgba(0,255,136,0.1); }
.wf-icon.ra { border-color:var(--warn); background:rgba(255,107,53,0.1); }
.wf-icon.ca { border-color:var(--danger); background:rgba(255,51,102,0.1); }
.wf-label { font-size:11px; color:var(--text-dim); text-align:center; letter-spacing:1px; }
/* PULSING DOT */
.pulse-dot {
  width:8px; height:8px; border-radius:50%; background:var(--accent2);
  display:inline-block; margin-right:6px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}
.separator { height:1px; background:var(--border); margin:20px 0; }
.text-muted { color:var(--text-dim); font-size:12px; }
.text-accent { color:var(--accent); }
.text-green { color:var(--accent2); }
.text-warn { color:var(--warn); }
.text-danger { color:var(--danger); }
.mb-4 { margin-bottom:16px; }
.mb-8 { margin-bottom:32px; }
.flex { display:flex; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.w-full { width:100%; }
.hidden { display:none; }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <span class="shield">🔐</span>
    <span>PKI<span style="color:var(--accent2)">.</span>SYSTEM</span>
  </div>
  {% block nav_links %}{% endblock %}
</nav>
{% block content %}{% endblock %}
<script>
function showAlert(container, type, msg) {
  const el = document.getElementById(container);
  if (!el) return;
  el.innerHTML = `<div class="alert alert-${type}">${type==='success'?'✓':type==='error'?'✗':'ℹ'} ${msg}</div>`;
  setTimeout(()=>{ if(el) el.innerHTML=''; }, 4000);
}
async function api(url, method='GET', data=null) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (data) opts.body = JSON.stringify(data);
  const r = await fetch(url, opts);
  return r.json();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
